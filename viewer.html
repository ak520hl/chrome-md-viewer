<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Markdown Viewer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
      line-height: 1.6;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0969da;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #0860ca;
    }

    #status {
      margin: 20px 0;
      padding: 10px;
      background: white;
      border-radius: 6px;
    }

    #files {
      margin: 20px 0;
    }

    .file-item {
      padding: 8px;
      margin: 4px 0;
      background: white;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #d0d7de;
    }

    .file-item:hover {
      background: #f6f8fa;
    }

    #content {
      margin: 20px 0;
      padding: 20px;
      background: white;
      border-radius: 6px;
      border: 1px solid #d0d7de;
    }

    /* Markdown渲染样式 */
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin-top: 24px;
      margin-bottom: 16px;
      font-weight: 600;
      line-height: 1.25;
    }

    .markdown-body h1 {
      font-size: 2em;
      border-bottom: 1px solid #d0d7de;
      padding-bottom: 0.3em;
    }

    .markdown-body h2 {
      font-size: 1.5em;
      border-bottom: 1px solid #d0d7de;
      padding-bottom: 0.3em;
    }

    .markdown-body h3 {
      font-size: 1.25em;
    }

    .markdown-body p {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .markdown-body code {
      padding: 0.2em 0.4em;
      margin: 0;
      font-size: 85%;
      background-color: rgba(175, 184, 193, 0.2);
      border-radius: 6px;
    }

    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      color: #24292f;
      background-color: #f6f8fa;
      border-radius: 6px;
    }

    .markdown-body pre code {
      padding: 0;
      margin: 0;
      font-size: 100%;
      background: transparent;
    }

    .markdown-body blockquote {
      padding: 0 1em;
      color: #656d76;
      border-left: 0.25em solid #d0d7de;
      margin-top: 0;
      margin-bottom: 16px;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 2em;
      margin-top: 0;
      margin-bottom: 16px;
    }

    .markdown-body li {
      margin-top: 0.25em;
    }

    .markdown-body table {
      border-spacing: 0;
      border-collapse: collapse;
      margin-top: 0;
      margin-bottom: 16px;
      width: 100%;
      overflow: auto;
    }

    .markdown-body table th,
    .markdown-body table td {
      padding: 6px 13px;
      border: 1px solid #d0d7de;
    }

    .markdown-body table th {
      font-weight: 600;
      background-color: #f6f8fa;
    }

    .markdown-body table tr:nth-child(2n) {
      background-color: #f6f8fa;
    }

    .markdown-body img {
      max-width: 100%;
    }

    .markdown-body hr {
      height: 0.25em;
      padding: 0;
      margin: 24px 0;
      background-color: #d0d7de;
      border: 0;
    }

    .markdown-body a {
      color: #0969da;
      text-decoration: none;
    }

    .markdown-body a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Markdown Viewer</h1>

  <button id="openBtn">打开目录</button>

  <p id="status">请点击按钮选择文件夹</p>

  <div id="files"></div>

  <div id="content"></div>

  <script src="libs/marked.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
