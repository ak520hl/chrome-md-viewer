<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="libs/github-markdown.css">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div class="container">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button id="toggle-sidebar" class="toggle-btn" title="折叠/展开侧边栏">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 4h12M2 8h12M2 12h12"/>
          </svg>
        </button>
        <span class="sidebar-title">Markdown Viewer</span>
        <button id="parent-directory" class="toggle-btn parent-btn" title="返回上级目录" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M10 12L6 8l4-4"/>
          </svg>
        </button>
        <button id="open-parent" class="toggle-btn parent-btn" title="打开上级目录" style="display: none;">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 12V4M8 4L4 8M8 4l4 4"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="files">文件</button>
        <button class="tab-btn" data-tab="toc">目录</button>
      </div>
      <div class="sidebar-content">
        <div class="tab-panel active" id="files-panel">
          <div id="file-list" class="file-list">
            <p class="placeholder">选择文件夹开始</p>
          </div>
        </div>
        <div class="tab-panel" id="toc-panel">
          <div id="toc-list" class="toc-list">
            <p class="placeholder">打开文件后显示</p>
          </div>
        </div>
      </div>
      <div class="sidebar-footer">
        <button id="open-directory" class="primary-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1 3.5h12M1 3.5v8.5h12V3.5M4.5 3.5V2h5v1.5"/>
          </svg>
          打开目录
        </button>
      </div>
    </aside>

    <!-- 拖动条 -->
    <div class="resize-handle" id="resize-handle"></div>

    <!-- 主内容区 -->
    <main class="content">
      <div class="content-header">
        <h1 id="current-file-name">未选择文件</h1>
        <div class="theme-switcher">
          <button id="theme-toggle-btn" class="toggle-btn" title="切换主题">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="8" r="3"/>
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/>
            </svg>
          </button>
          <div id="theme-panel" class="theme-panel">
            <div class="theme-panel-section">
              <span class="theme-panel-label">模式</span>
              <div class="theme-mode-toggle">
                <button class="mode-btn active" data-mode="light" title="亮色">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="3"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M3.05 3.05l1.06 1.06M9.89 9.89l1.06 1.06M3.05 10.95l1.06-1.06M9.89 4.11l1.06-1.06"/></svg>
                  亮色
                </button>
                <button class="mode-btn" data-mode="dark" title="暗色">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 7.94A6 6 0 016.06 1 6 6 0 107 13a6 6 0 006-5.06z"/></svg>
                  暗色
                </button>
              </div>
            </div>
            <div class="theme-panel-section">
              <span class="theme-panel-label">配色</span>
              <div class="theme-colors">
                <button class="color-dot active" data-color="purple" style="--dot-color: #7c3aed" title="紫色"></button>
                <button class="color-dot" data-color="blue" style="--dot-color: #2563eb" title="蓝色"></button>
                <button class="color-dot" data-color="green" style="--dot-color: #059669" title="绿色"></button>
                <button class="color-dot" data-color="orange" style="--dot-color: #ea580c" title="橙色"></button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="markdown-content" class="markdown-body">
        <div class="welcome">
          <svg class="welcome-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="8" y="4" width="48" height="56" rx="4"/>
            <path d="M20 20h24M20 28h24M20 36h16"/>
          </svg>
          <h2>Markdown Viewer</h2>
          <p>点击左侧"打开目录"按钮，选择包含 Markdown 文件的文件夹开始阅读</p>
        </div>
      </div>
    </main>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" class="back-to-top" title="返回顶部">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 14V4M9 4L4 9M9 4l5 5"/>
      </svg>
    </button>
  </div>

  <script src="libs/marked.min.js"></script>
  <script src="libs/mermaid.min.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
