<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Markdown Viewer</title>
</head>
<body style="font-family: Arial; padding: 20px; background: #f5f5f5;">
  <h1 style="color: #333;">Markdown Viewer</h1>

  <button id="openBtn" style="padding: 10px 20px; font-size: 16px; background: #0969da; color: white; border: none; border-radius: 6px; cursor: pointer;">
    打开目录
  </button>

  <p id="status" style="margin: 20px 0; padding: 10px; background: white; border-radius: 6px;">
    请点击按钮选择文件夹
  </p>

  <div id="files" style="margin: 20px 0;"></div>

  <div id="content" style="margin: 20px 0; padding: 20px; background: white; border-radius: 6px;"></div>

  <script src="viewer.js"></script>
</body>
</html>
