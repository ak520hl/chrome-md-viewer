<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      color: #24292f;
      background-color: #ffffff;
    }

    .container {
      display: flex;
      height: 400px;
      width: 600px;
      overflow: hidden;
    }

    .sidebar {
      width: 200px;
      background-color: #f6f8fa;
      border-right: 1px solid #d0d7de;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #d0d7de;
      font-weight: 600;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .placeholder {
      color: #656d76;
      font-size: 14px;
      text-align: center;
      padding: 20px;
    }

    .primary-btn {
      width: 100%;
      padding: 8px 16px;
      background-color: #0969da;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .primary-btn:hover {
      background-color: #0860ca;
    }
  </style>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">Markdown Viewer</div>
      <div class="sidebar-content">
        <p class="placeholder">点击下方按钮选择文件夹</p>
        <button id="open-directory" class="primary-btn">打开目录</button>
      </div>
    </aside>
    <main class="content">
      <p class="placeholder">请选择一个Markdown文件</p>
    </main>
  </div>

  <script>
    console.log('viewer.html 加载成功');

    document.addEventListener('DOMContentLoaded', function() {
      console.log('DOM 加载完成');

      const openBtn = document.getElementById('open-directory');
      if (openBtn) {
        openBtn.addEventListener('click', async function() {
          console.log('点击打开目录按钮');

          try {
            const directoryHandle = await window.showDirectoryPicker();
            console.log('选择的目录:', directoryHandle.name);

            const files = [];
            for await (const entry of directoryHandle.values()) {
              if (entry.kind === 'file' && entry.name.endsWith('.md')) {
                files.push(entry.name);
              }
            }

            console.log('找到的Markdown文件:', files);
            alert('找到 ' + files.length + ' 个Markdown文件:\n' + files.join('\n'));
          } catch (error) {
            console.error('错误:', error);
            if (error.name !== 'AbortError') {
              alert('错误: ' + error.message);
            }
          }
        });
      }
    });
  </script>
</body>
</html>
