<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Markdown Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f0f0f0;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #0969da;
      color: white;
      border: none;
      border-radius: 6px;
      margin: 10px 0;
    }
    button:hover {
      background: #0860ca;
    }
    #status {
      margin: 20px 0;
      padding: 10px;
      background: white;
      border-radius: 6px;
    }
    #file-list {
      margin: 20px 0;
    }
    .file-item {
      padding: 8px;
      cursor: pointer;
      background: white;
      margin: 4px 0;
      border-radius: 4px;
    }
    .file-item:hover {
      background: #e1e4e8;
    }
  </style>
</head>
<body>
  <h1>Markdown Viewer</h1>
  <button id="openBtn">打开目录</button>
  <div id="status">请点击按钮选择文件夹</div>
  <div id="file-list"></div>
  <div id="content"></div>

  <script>
    document.getElementById('openBtn').onclick = function() {
      document.getElementById('status').textContent = '正在打开目录选择器...';

      window.showDirectoryPicker().then(function(dir) {
        document.getElementById('status').textContent = '已选择目录: ' + dir.name;

        var fileList = document.getElementById('file-list');
        fileList.innerHTML = '<h3>文件列表:</h3>';

        var count = 0;
        var entries = dir.values();

        function processNext() {
          entries.next().then(function(result) {
            if (result.done) {
              if (count === 0) {
                fileList.innerHTML += '<p>没有找到Markdown文件</p>';
              }
              return;
            }

            var entry = result.value;
            if (entry.kind === 'file' && entry.name.endsWith('.md')) {
              count++;
              var div = document.createElement('div');
              div.className = 'file-item';
              div.textContent = '📄 ' + entry.name;
              div.onclick = function() {
                readFile(entry);
              };
              fileList.appendChild(div);
            }

            processNext();
          });
        }

        processNext();
      }).catch(function(err) {
        if (err.name !== 'AbortError') {
          document.getElementById('status').textContent = '错误: ' + err.message;
        } else {
          document.getElementById('status').textContent = '已取消选择';
        }
      });
    };

    function readFile(fileHandle) {
      fileHandle.getFile().then(function(file) {
        return file.text();
      }).then(function(text) {
        document.getElementById('content').innerHTML = '<h3>' + fileHandle.name + '</h3><pre>' + text + '</pre>';
      }).catch(function(err) {
        document.getElementById('content').innerHTML = '<p style="color:red">读取失败: ' + err.message + '</p>';
      });
    }

    console.log('页面加载完成');
  </script>
</body>
</html>
